name: Build iOS IPA (Simple)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Initialize iOS project
        run: |
          set -e
          export CI=false
          echo "=== 开始初始化 Tauri iOS 项目 ==="
          pnpm tauri ios init -v

      - name: Prepare Tauri Assets (Expect Failure)
        run: |
          echo "=== 运行 Tauri 官方构建以准备资源 ==="
          echo "注意：这一步预期会在 Xcode 签名阶段报错，这是完全正常的！"
          echo "我们只需要它把前端资源和 Rust 代码准备好。"
          # 加上 || true 允许这一步报错，继续往下执行
          pnpm tauri ios build || true

      - name: Build Unsigned App (Manual xcodebuild)
        run: |
          set -e
          echo "=== 使用 xcodebuild 强制免签打包 ==="
          
          XCODE_PROJECT=$(find src-tauri/gen/apple -name "*.xcodeproj" -type d | head -1)
          XCWORKSPACE=$(find src-tauri/gen/apple -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(xcodebuild -list -project "$XCODE_PROJECT" | grep -A 20 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          
          # 核心修复：必须使用小写的 release，否则 Tauri 脚本会崩溃！
          # 并且直接传入免签参数，彻底绕过苹果的 Team 检查
          if [ -n "$XCWORKSPACE" ]; then
            xcodebuild build \
              -workspace "$XCWORKSPACE" \
              -scheme "$SCHEME" \
              -configuration release \
              -sdk iphoneos \
              -arch arm64 \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            xcodebuild build \
              -project "$XCODE_PROJECT" \
              -scheme "$SCHEME" \
              -configuration release \
              -sdk iphoneos \
              -arch arm64 \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: Create unsigned IPA
        run: |
          set -e
          echo "=== 正在打包生成 IPA 文件 ==="
          
          APP_PATH=$(find src-tauri/gen/apple -name "*.app" -path "*iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到编译好的 app: $APP_PATH"
            
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            
            IPA_NAME="Legado-unsigned.ipa"
            zip -qr "$IPA_NAME" Payload/
            
            echo "ipa_path=$(pwd)/$IPA_NAME" >> $GITHUB_ENV
            echo "✅ IPA 创建成功: $IPA_NAME"
          else
            echo "❌ 致命错误：找不到编译好的 .app 文件，无法打包 IPA！"
            exit 1
          fi

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-unsigned-ipa
          path: "*.ipa"
          retention-days: 90
        if: env.ipa_path != ''
