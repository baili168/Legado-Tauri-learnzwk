name: Build iOS IPA (Simple)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Initialize iOS project
        run: |
          set -e
          export CI=false
          echo "=== 开始初始化 Tauri iOS 项目 ==="
          pnpm tauri ios init -v

      - name: Build iOS App (Official Tauri CLI with No-Sign flags)
        run: |
          set -e
          export CI=false
          echo "=== 开始使用 Tauri 官方命令构建 iOS（注入免签参数） ==="
          
          # 核心绝杀：通过 -- 将免签参数直接透传给底层的 xcodebuild
          pnpm exec tauri ios build -- CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          set -e
          echo "=== 正在打包生成 IPA 文件 ==="
          
          APP_PATH=$(find src-tauri/gen/apple -name "*.app" -path "*iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到编译好的 app: $APP_PATH"
            
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            
            IPA_NAME="Legado-unsigned.ipa"
            zip -qr "$IPA_NAME" Payload/
            
            echo "ipa_path=$(pwd)/$IPA_NAME" >> $GITHUB_ENV
            echo "✅ IPA 创建成功: $IPA_NAME"
          else
            echo "❌ 致命错误：找不到编译好的 .app 文件，无法打包 IPA！"
            exit 1
          fi

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-unsigned-ipa
          path: "*.ipa"
          retention-days: 90
        if: env.ipa_path != ''
