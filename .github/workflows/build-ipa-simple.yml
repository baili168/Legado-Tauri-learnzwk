name: Build iOS IPA (Simple)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Initialize iOS project
        run: |
          export CI=false
          pnpm tauri ios init

      - name: Build iOS Simulator
        run: |
          export CI=false
          echo "Building for iOS Simulator..."
          pnpm tauri ios build --target aarch64-apple-ios-sim 2>&1 | tee build-sim.log | tail -200

      - name: Find Simulator artifacts
        id: find_sim
        run: |
          echo "=== Looking for simulator artifacts ==="
          APP_PATH=$(find src-tauri/target/aarch64-apple-ios-sim -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/ios -name "*.app" -type d 2>/dev/null | head -1)
          fi
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          if [ -n "$APP_PATH" ]; then
            echo "Found .app: $APP_PATH"
            ls -lh "$APP_PATH"
          else
            echo "No .app found, listing target directory..."
            ls -la src-tauri/target/ 2>/dev/null || true
          fi

      - name: Upload Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-simulator-app
          path: ${{ steps.find_sim.outputs.app_path }}
          retention-days: 90
        if: ${{ steps.find_sim.outputs.app_path != '' }}

      - name: Try building unsigned IPA (for device)
        run: |
          export CI=false
          echo "Building for iOS (unsigned)..."
          
          XCODE_PROJECT=$(find src-tauri/gen/ios -name "*.xcodeproj" -type d 2>/dev/null | head -1)
          if [ -n "$XCODE_PROJECT" ]; then
            SCHEME=$(xcodebuild -list -project "$XCODE_PROJECT" 2>/dev/null | grep -A 20 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
            echo "Building scheme: $SCHEME for device"
            
            xcodebuild clean build \
              -project "$XCODE_PROJECT" \
              -scheme "$SCHEME" \
              -sdk iphoneos \
              -arch arm64 \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO 2>&1 | tee build-device.log | tail -200
          fi

      - name: Create unsigned IPA
        run: |
          echo "=== Creating unsigned IPA ==="
          
          # Find the .app file from device build
          APP_PATH=$(find src-tauri/gen/ios -name "*.app" -path "*iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/ios -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            
            # Create IPA structure
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            
            # Create IPA (it's just a zip)
            IPA_NAME="Legado-unsigned.ipa"
            zip -r "$IPA_NAME" Payload/
            ls -lh "$IPA_NAME"
            
            echo "ipa_path=$(pwd)/$IPA_NAME" >> $GITHUB_ENV
          else
            echo "No .app file found for device"
            echo "Listing build artifacts..."
            find src-tauri/gen/ios -name "*.app" -type d 2>/dev/null || true
          fi

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-unsigned-ipa
          path: "*.ipa"
          retention-days: 90
        if: env.ipa_path != ''

      - name: Build log
        run: |
          if [ -f "build-sim.log" ]; then
            echo "=== Simulator build log (last 300 lines) ==="
            tail -300 build-sim.log
          fi
          if [ -f "build-device.log" ]; then
            echo ""
            echo "=== Device build log (last 300 lines) ==="
            tail -300 build-device.log
          fi
        if: failure()
