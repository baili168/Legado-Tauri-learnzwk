name: Build iOS IPA (Simple)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Initialize iOS project
        run: |
          set -e
          export CI=false
          echo "=== 开始初始化 Tauri iOS 项目 ==="
          pnpm tauri ios init -v

      - name: Disable Code Signing in Xcode Project
        run: |
          set -e
          echo "=== 强行修改 Xcode 工程，彻底关闭自动签名 ==="
          PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -1)
          if [ -n "$PBXPROJ" ]; then
            # 1. 把自动签名改成手动签名 (最关键的一步，打破 Xcode 的流氓拦截！)
            sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
            
            # 2. 删掉所有关于 DevelopmentTeam 的配置
            sed -i '' '/DevelopmentTeam/d' "$PBXPROJ"
            sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
            
            # 3. 把签名要求改成 NO
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' "$PBXPROJ"
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' "$PBXPROJ"
            
            echo "✅ 成功将工程修改为手动免签模式: $PBXPROJ"
          else
            echo "❌ 致命错误：未找到 project.pbxproj 文件"
            exit 1
          fi

      - name: Build iOS App (Official Tauri CLI)
        run: |
          set -e
          export CI=false
          echo "=== 开始使用 Tauri 官方命令构建 iOS ==="
          
          # 工程文件已经被阉割，现在再配合命令行参数，双管齐下！
          pnpm tauri ios build -- CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="" PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create unsigned IPA
        run: |
          set -e
          echo "=== 正在打包生成 IPA 文件 ==="
          
          APP_PATH=$(find src-tauri/gen/apple -name "*.app" -path "*iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/apple -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到编译好的 app: $APP_PATH"
            
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            
            IPA_NAME="Legado-unsigned.ipa"
            zip -qr "$IPA_NAME" Payload/
            
            echo "ipa_path=$(pwd)/$IPA_NAME" >> $GITHUB_ENV
            echo "✅ IPA 创建成功: $IPA_NAME"
          else
            echo "❌ 致命错误：找不到编译好的 .app 文件，无法打包 IPA！"
            exit 1
          fi

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-unsigned-ipa
          path: "*.ipa"
          retention-days: 90
        if: env.ipa_path != ''
