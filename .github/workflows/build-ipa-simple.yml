name: Build iOS IPA (Simple)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Initialize iOS project
        run: |
          set -e
          export CI=false
          echo "=== 开始初始化 Tauri iOS 项目 ==="
          pnpm tauri ios init -v

      - name: Build iOS Simulator
        run: |
          set -e
          export CI=false
          echo "=== 开始构建 iOS 模拟器版本 ==="
          # 去掉隐藏报错的管道符，直接输出完整日志
          pnpm tauri ios build --target aarch64-apple-ios-sim

      - name: Find Simulator artifacts
        id: find_sim
        run: |
          set -e
          echo "=== 寻找模拟器产物 ==="
          APP_PATH=$(find src-tauri/target/aarch64-apple-ios-sim -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/ios -name "*.app" -type d 2>/dev/null | head -1)
          fi
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          if [ -n "$APP_PATH" ]; then
            echo "找到模拟器 .app: $APP_PATH"
          else
            echo "⚠️ 警告: 没有找到模拟器的 .app 文件"
          fi

      - name: Upload Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-simulator-app
          path: ${{ steps.find_sim.outputs.app_path }}
          retention-days: 90
        if: ${{ steps.find_sim.outputs.app_path != '' }}

      - name: Try building unsigned IPA (for device)
        run: |
          set -e
          export CI=false
          echo "=== 开始构建真机无签名版本 ==="
          
          if [ ! -d "src-tauri/gen/ios" ]; then
            echo "❌ 致命错误：找不到 src-tauri/gen/ios 目录！前面的 Tauri 初始化或构建失败了！"
            exit 1
          fi
          
          XCODE_PROJECT=$(find src-tauri/gen/ios -name "*.xcodeproj" -type d | head -1)
          if [ -z "$XCODE_PROJECT" ]; then
            echo "❌ 致命错误：找不到 .xcodeproj Xcode工程文件！"
            exit 1
          fi
          
          echo "找到的 Xcode 项目路径: $XCODE_PROJECT"
          
          SCHEME=$(xcodebuild -list -project "$XCODE_PROJECT" | grep -A 20 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "准备构建 Scheme: $SCHEME"
          
          # 直接运行 xcodebuild，不隐藏任何报错
          xcodebuild clean build \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          set -e
          echo "=== 正在打包生成 IPA 文件 ==="
          
          APP_PATH=$(find src-tauri/gen/ios -name "*.app" -path "*iphoneos*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find src-tauri/gen/ios -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到编译好的 app: $APP_PATH"
            
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            
            IPA_NAME="Legado-unsigned.ipa"
            zip -qr "$IPA_NAME" Payload/
            
            echo "ipa_path=$(pwd)/$IPA_NAME" >> $GITHUB_ENV
            echo "✅ IPA 创建成功: $IPA_NAME"
          else
            echo "❌ 致命错误：找不到编译好的 .app 文件，无法打包 IPA！"
            exit 1
          fi

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-unsigned-ipa
          path: "*.ipa"
          retention-days: 90
        if: env.ipa_path != ''
