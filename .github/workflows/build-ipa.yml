name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CI: false

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Install Tauri CLI globally
        run: |
          pnpm add -g @tauri-apps/cli
          echo "PATH=$PATH:$(pnpm bin -g)" >> $GITHUB_ENV

      - name: Build frontend
        run: pnpm build

      - name: Initialize iOS project
        run: |
          set -e
          echo "=== 开始初始化 Tauri iOS 项目 ==="
          pnpm tauri ios init -v

      - name: Verify iOS project
        run: |
          echo "=== 检查 iOS 项目结构 ==="
          ls -la src-tauri/gen/
          ls -la src-tauri/gen/apple/ 2>/dev/null || echo "apple目录不存在"

      - name: Disable code signing in Xcode project
        run: |
          set -e
          echo "=== 修改 Xcode 配置以禁用签名 ==="
          
          PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -1)
          
          if [ -z "$PBXPROJ" ]; then
            echo "❌ 找不到 project.pbxproj 文件"
            find src-tauri -name "*.pbxproj" 2>/dev/null || echo "未找到任何 pbxproj 文件"
            exit 1
          fi
          
          echo "找到 pbxproj: $PBXPROJ"
          
          # 物理替换签名配置
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' "$PBXPROJ"
          
          # 移除所有 DEVELOPMENT_TEAM 引用
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          
          # 移除 PROVISIONING_PROFILE_SPECIFIER
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' "$PBXPROJ"
          
          echo "✅ Xcode 配置修改完成"

      - name: Create nosign.xcconfig
        run: |
          PNPM_BIN=$(pnpm bin -g)
          cat <<EOF > nosign.xcconfig
          CODE_SIGN_IDENTITY =
          CODE_SIGNING_REQUIRED = NO
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGN_STYLE = Manual
          DEVELOPMENT_TEAM =
          PROVISIONING_PROFILE_SPECIFIER =
          ONLY_ACTIVE_ARCH = NO
          ARCHS = arm64
          VALID_ARCHS = arm64
          EOF
          
          cat nosign.xcconfig

      - name: Get Xcode scheme
        id: xcode-info
        run: |
          XCODE_PROJECT=$(find src-tauri/gen/apple -name "*.xcodeproj" -type d | head -1)
          XCWORKSPACE=$(find src-tauri/gen/apple -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(xcodebuild -list -project "$XCODE_PROJECT" 2>/dev/null | grep -A 20 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          
          if [ -z "$SCHEME" ]; then
            SCHEME="Legado"
          fi
          
          echo "XCODE_PROJECT=$XCODE_PROJECT" >> $GITHUB_ENV
          echo "XCWORKSPACE=$XCWORKSPACE" >> $GITHUB_ENV
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          
          echo "Xcode 项目: $XCODE_PROJECT"
          echo "Workspace: $XCWORKSPACE"
          echo "Scheme: $SCHEME"

      - name: Create Tauri server-addr file
        run: |
          set -e
          # 找到系统临时目录
          TMPDIR=$(python3 -c 'import tempfile; print(tempfile.gettempdir())')
          echo "系统临时目录: $TMPDIR"
          
          # 创建 Tauri 需要的 server-addr 文件
          SERVER_ADDR_FILE="$TMPDIR/com.legado.reader-server-addr"
          echo "http://localhost:1420" > "$SERVER_ADDR_FILE"
          echo "创建文件: $SERVER_ADDR_FILE"
          cat "$SERVER_ADDR_FILE"
          
          # 同时也在常见的临时位置创建
          echo "http://localhost:1420" > "/tmp/com.legado.reader-server-addr"

      - name: Modify Xcode project to disable signing
        run: |
          set -e
          PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -1)
          echo "修改 PBXPROJ: $PBXPROJ"
          
          # 1. 替换所有 Automatic 为 Manual
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          
          # 2. 删除所有 DEVELOPMENT_TEAM 行
          sed -i '' '/DEVELOPMENT_TEAM/d' "$PBXPROJ"
          
          # 3. 删除 PROVISIONING_PROFILE_SPECIFIER 行
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' "$PBXPROJ"
          
          # 4. 删除 CODE_SIGN_IDENTITY 行
          sed -i '' '/CODE_SIGN_IDENTITY/d' "$PBXPROJ"
          
          # 5. 在每个 buildSettings 块添加禁用签名配置
          awk '
            /buildSettings = \{/ {
              print $0
              print "                    CODE_SIGNING_REQUIRED = NO;"
              print "                    CODE_SIGNING_ALLOWED = NO;"
              print "                    CODE_SIGN_IDENTITY = \"\";"
              print "                    CODE_SIGN_STYLE = Manual;"
              next
            }
            { print }
          ' "$PBXPROJ" > "$PBXPROJ.tmp" && mv "$PBXPROJ.tmp" "$PBXPROJ"
          
          echo "✅ 签名配置已修改"
          grep -A 5 "buildSettings" "$PBXPROJ" | head -30

      - name: Build iOS app with xcodebuild (unsigned)
        run: |
          set -e
          echo "=== 使用 xcodebuild 构建 ==="
          
          XCWORKSPACE=$(find src-tauri/gen/apple -name "*.xcworkspace" -type d | head -1)
          SCHEME=$(xcodebuild -list -workspace "$XCWORKSPACE" 2>/dev/null | grep -A 20 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          
          if [ -z "$SCHEME" ]; then
            SCHEME="app_iOS"
          fi
          
          echo "Workspace: $XCWORKSPACE"
          echo "Scheme: $SCHEME"
          
          # 先创建所有可能位置的 server-addr 文件
          echo "http://localhost:1420" > "$TMPDIR/com.legado.reader-server-addr" 2>/dev/null || true
          echo "http://localhost:1420" > "/tmp/com.legado.reader-server-addr" 2>/dev/null || true
          echo "http://localhost:1420" > "$HOME/com.legado.reader-server-addr" 2>/dev/null || true
          
          # 检查 Rust 环境
          rustup show
          cargo --version
          
          # 构建 xcodebuild，增加详细日志
          xcodebuild build \
            -workspace "$XCWORKSPACE" \
            -scheme "$SCHEME" \
            -configuration release \
            -sdk iphoneos \
            -arch arm64 \
            -quiet \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" 2>&1 | tail -200

      - name: Find .app file
        id: find-app
        run: |
          echo "=== 搜索编译好的 .app 文件 ==="
          
          # 多种搜索路径
          APP_PATH=""
          
          # 搜索可能的位置
          SEARCH_PATHS=(
            "src-tauri/gen/apple/build/Release-iphoneos"
            "src-tauri/gen/apple/build/Release"
            "src-tauri/gen/apple"
            "$HOME/Library/Developer/Xcode/DerivedData"
          )
          
          for path in "${SEARCH_PATHS[@]}"; do
            if [ -d "$path" ]; then
              FOUND=$(find "$path" -name "*.app" -type d 2>/dev/null | head -1)
              if [ -n "$FOUND" ] && [ -d "$FOUND" ]; then
                APP_PATH="$FOUND"
                break
              fi
            fi
          done
          
          if [ -z "$APP_PATH" ]; then
            echo "全局搜索..."
            APP_PATH=$(find / -name "*.app" -path "*Legado*" -type d 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到 .app 文件: $APP_PATH"
            echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          else
            echo "❌ 未找到 .app 文件"
            echo "输出目录结构:"
            find src-tauri/gen -type d -name "build" 2>/dev/null | head -20
            exit 1
          fi

      - name: Create unsigned IPA
        run: |
          set -e
          echo "=== 正在打包生成 IPA 文件 ==="
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # 移除签名相关文件
          find Payload -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find Payload -name "embedded.mobileprovision" -delete 2>/dev/null || true
          
          IPA_NAME="Legado-unsigned.ipa"
          zip -qr "$IPA_NAME" Payload/
          
          # 清理
          rm -rf Payload
          rm -f nosign.xcconfig
          
          echo "ipa_path=$(pwd)/$IPA_NAME" >> $GITHUB_ENV
          echo "✅ IPA 创建成功: $IPA_NAME"
          ls -lh "$IPA_NAME"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: legado-ios-unsigned-ipa
          path: "*.ipa"
          retention-days: 90
        if: env.ipa_path != ''
