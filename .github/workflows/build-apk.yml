name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-apk:
    name: Build APK (aarch64)
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;29.0.14206865"

      - name: Setup Android environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Create cargo config for NDK linker
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          
          [target.armv7-linux-androideabi]
          linker = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang"
          
          [target.i686-linux-android]
          linker = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android24-clang"
          
          [target.x86_64-linux-android]
          linker = "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android24-clang"
          EOF
          echo "--- ~/.cargo/config.toml ---"
          cat ~/.cargo/config.toml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify environment
        run: |
          echo "Node: $(node --version)"
          echo "pnpm: $(pnpm --version)"
          echo "Java: $(java --version)"
          echo "Rust: $(rustc --version)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          ls "$ANDROID_HOME/platforms/android-35/android.jar" && echo "✓ android.jar"
          ls "$ANDROID_HOME/build-tools/35.0.0/aapt2" && echo "✓ aapt2"
          ls "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" && echo "✓ NDK clang"

      - name: Build frontend
        run: pnpm build

      - name: Initialize Android project
        run: |
          export CI=false
          pnpm tauri android init

      - name: Build APK
        run: |
          export CI=false
          # 使用和 Tauri 兼容的 NDK 29
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/29.0.14206865"
          pnpm tauri android build --apk --target aarch64

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find src-tauri/gen/android -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found at: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-android-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Summary
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.find_apk.outputs.apk_path }}" ]; then
            echo "✅ APK built successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No APK found" >> $GITHUB_STEP_SUMMARY
          fi