name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-apk:
    name: Build APK (aarch64)
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;29.0.14206865"

      - name: Setup Android environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Create cargo config for NDK linker
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'TOML'
          [target.aarch64-linux-android]
          linker = "aarch64-linux-android24-clang"
          TOML
          echo "--- ~/.cargo/config.toml ---"
          cat ~/.cargo/config.toml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify environment
        run: |
          echo "Node: $(node --version)"
          echo "pnpm: $(pnpm --version)"
          echo "Java: $(java --version 2>&1 | head -1)"
          echo "Rust: $(rustc --version)"
          echo "Cargo: $(cargo --version)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          rustup target list --installed | grep android
          ls "$ANDROID_HOME/platforms/android-35/android.jar" && echo "✓ android.jar"
          ls "$ANDROID_HOME/build-tools/35.0.0/aapt2" && echo "✓ aapt2"

      - name: Build frontend
        run: pnpm build

      - name: Initialize Android project
        run: |
          export CI=false
          pnpm tauri android init

      - name: Patch generated Android files
        run: |
          echo "=== Patching generated Android build files ==="

          # 1. Fix rootDirRel: CI 生成的 ../../.. 从 app/ 算少了一级，应为 ../../../..
          BUILD_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          if [ -f "$BUILD_GRADLE" ]; then
            echo "Before:"
            grep "rootDirRel" "$BUILD_GRADLE" || echo "  (no rootDirRel found)"
            sed -i 's|rootDirRel = "../../.."|rootDirRel = "../../../.."|g' "$BUILD_GRADLE"
            sed -i 's|rootDirRel = "../../../../"|rootDirRel = "../../../.."|g' "$BUILD_GRADLE"
            echo "After:"
            grep "rootDirRel" "$BUILD_GRADLE" || echo "  (no rootDirRel found)"
            echo "✅ rootDirRel fixed"
          else
            echo "⚠️ $BUILD_GRADLE not found"
          fi

          # 2. Patch BuildTask.kt to use node directly instead of pnpm
          BUILD_TASK_DIR="src-tauri/gen/android/buildSrc/src/main/java/com/legado/reader/kotlin"
          if [ -d "$BUILD_TASK_DIR" ]; then
            cp android-config/BuildTask.kt "$BUILD_TASK_DIR/BuildTask.kt"
            echo "✅ BuildTask.kt patched"
          else
            BUILD_TASK_DIR=$(find src-tauri/gen/android -name "BuildTask.kt" -path "*/kotlin/*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
            if [ -n "$BUILD_TASK_DIR" ] && [ -d "$BUILD_TASK_DIR" ]; then
              cp android-config/BuildTask.kt "$BUILD_TASK_DIR/BuildTask.kt"
              echo "✅ BuildTask.kt patched at $BUILD_TASK_DIR"
            else
              echo "⚠️ BuildTask.kt not found"
            fi
          fi

      - name: Build APK (verbose)
        run: |
          export CI=false
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/29.0.14206865"
          export PATH="${{ github.workspace }}/node_modules/.bin:$PATH"
          pnpm tauri android build --apk --target aarch64 -v 2>&1 | tee build-output.log

      - name: Verify build output
        run: |
          echo "=== Checking for Rust .so library ==="
          find src-tauri/gen/android -name "*.so" -type f 2>/dev/null | while read so; do
            size=$(stat -c%s "$so" 2>/dev/null || stat -f%z "$so" 2>/dev/null)
            echo "  $so ($(echo "scale=1; $size/1024/1024" | bc)MB)"
          done

          count=$(find src-tauri/gen/android -name "*.so" -type f 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "⚠️ WARNING: No .so files found! Rust compilation may have failed."
            echo "Checking cargo build output directory..."
            find src-tauri/target -name "*.so" -type f 2>/dev/null | while read so; do
              size=$(stat -c%s "$so" 2>/dev/null || stat -f%z "$so" 2>/dev/null)
              echo "  $so ($(echo "scale=1; $size/1024/1024" | bc)MB)"
            done
          fi

          echo ""
          echo "=== All .apk files ==="
          find src-tauri/gen/android -name "*.apk" -type f 2>/dev/null | while read apk; do
            size=$(stat -c%s "$apk" 2>/dev/null || stat -f%z "$apk" 2>/dev/null)
            echo "  $apk ($(echo "scale=1; $size/1024/1024" | bc)MB)"
          done

          echo ""
          echo "=== Checking dist size ==="
          if [ -d "dist" ]; then
            dist_size=$(du -sh dist 2>/dev/null | cut -f1)
            echo "  dist/ total size: $dist_size"
          fi

      - name: Find APK
        id: find_apk
        run: |
          # Prefer release APK with arm64 in path
          APK_PATH=$(find src-tauri/gen/android -path "*/arm64/release/*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/gen/android -path "*release*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/gen/android -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo ""
          echo "Selected APK: $APK_PATH"
          apk_size=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null)
          echo "APK size: $(echo "scale=1; $apk_size/1024/1024" | bc)MB"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-android-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Summary
        run: |
          APK_PATH="${{ steps.find_apk.outputs.apk_path }}"
          echo "## APK Build Summary" >> $GITHUB_STEP_SUMMARY
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            apk_size=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null)
            apk_mb=$(echo "scale=1; $apk_size/1024/1024" | bc)
            echo "✅ APK: \`$APK_PATH\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Size: **${apk_mb} MB**" >> $GITHUB_STEP_SUMMARY
            if (( $(echo "$apk_mb < 30" | bc -l) )); then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **APK is small (< 30MB)** — Rust native library may be missing!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ No APK found" >> $GITHUB_STEP_SUMMARY
          fi